<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lemon Cafe</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
       
    body, html {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    /* Arka plan resmi ve boyutu */
    .background-image {
      background-image: url('/img/LımonCaffeDukkan.jpg'); /* Resim URL'sini değiştirin */
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Form kutusunu ortalamak için */
    .form-container {
      background-color: rgba(255, 255, 255, 0.8); /* Yarı saydam arka plan */
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.2);
      max-width: 400px;
      width: 100%;
    }
  
      </style>
  </head>
  <body>
    <div class="background-image">
     
      <div class="form-container">
        <h2 class="text-center mb-4">Kayıt Formu</h2>
        <div id="alertContainer"></div>
        <form id="registerForm">
          <div class="mb-3">
            <label for="firstName" class="form-label">Ad</label>
            <input
              type="text"
              class="form-control"
              id="firstName"
              placeholder="Adınızı girin"
              required
            />
          </div>
          <div class="mb-3">
            <label for="lastName" class="form-label">Soyad</label>
            <input
              type="text"
              class="form-control"
              id="lastName"
              placeholder="Soyadınızı girin"
              required
            />
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input
              type="email"
              class="form-control"
              id="email"
              placeholder="Email adresinizi girin"
              required
            />
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Şifre</label>
            <input
              type="password"
              class="form-control"
              id="password"
              placeholder="Şifrenizi girin"
              required
            />
          </div>
          <div class="mb-3">
            <label class="form-label">Cinsiyet</label><br />
            <div class="form-check form-check-inline">
              <input
                class="form-check-input"
                type="radio"
                name="gender"
                id="male"
                value="Erkek"
                required
              />
              <label class="form-check-label" for="male">Erkek</label>
            </div>
            <div class="form-check form-check-inline">
              <input
                class="form-check-input"
                type="radio"
                name="gender"
                id="female"
                value="Kadın"
                required
              />
              <label class="form-check-label" for="female">Kadın</label>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100">Kayıt Ol</button>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.getElementById('registerForm').addEventListener('submit', function (e) {
        e.preventDefault();
        
        const firstName = document.getElementById('firstName').value.trim();
        const lastName = document.getElementById('lastName').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const gender = document.querySelector('input[name="gender"]:checked').value;
        const alertContainer = document.getElementById('alertContainer');
        
        alertContainer.innerHTML = ''; // Clear previous alerts
        
        // Custom Validation Algorithm
        if (password.length < 6) {
          showAlert('Şifre en az 6 karakter olmalıdır!', 'danger');
          return;
        }
        
        // Success flow
        showAlert(`Kayıt Başarılı! Hoş geldiniz, ${firstName} ${lastName}. Ana sayfaya yönlendiriliyorsunuz...`, 'success');
        
        // Disable button & redirect after delay
        const submitBtn = e.target.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        
        setTimeout(() => {
          window.location.href = 'Anasayfa.html';
        }, 2000);
      });

      function showAlert(message, type) {
        const alertContainer = document.getElementById('alertContainer');
        alertContainer.innerHTML = `
          <div class="alert alert-${type} alert-dismissible fade show" role="alert">
            ${message}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        `;
      }
    </script>
  </body>
</html>
